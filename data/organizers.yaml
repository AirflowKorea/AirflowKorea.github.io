# Airflow Korea User Group 운영진 정보
# - generation: 기수 (숫자)
# - role: 리더, 운영진
# - pre-commit run --all-files 를 실행하면 이름 가나다 순으로 id 값이 정렬됨
#
# OB 서포터(ob_supporters): 기수 활동을 마쳤지만 커뮤니티의 각종 기획을 계속 지원하는 분들
# - from_generations: 출신 기수 목록 (e.g. [1, 2])
# - term_start / term_end: OB 활동 기간 (YYYY-MM, 기본 2년 권장)
# - term_end가 지난 OB는 페이지에서 자동으로 숨겨집니다. 갱신 시 term_end를 연장하세요.
# - id는 ob_001, ob_002 형식으로 pre-commit이 이름 가나다 순으로 자동 재번호합니다

